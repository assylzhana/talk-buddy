spring:
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
openai:
  api-key: ${API}
  responses-url: https://api.openai.com/v1/responses
  speech-url: https://api.openai.com/v1/audio/speech