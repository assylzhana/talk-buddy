<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{account.title}">Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/student.css}">
    <style>
        body {
            background: url('/img/img_1.png') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 th:text="#{account.title}">Account</h3>
</div>

<div class="page">

    <div class="profile">

        <div class="profile-header">

            <div class="avatar"
                 th:text="${user.username.substring(0,1).toUpperCase()}">
            </div>

            <div class="profile-info">
                <div class="name"
                     th:text="${user.firstName != null ? user.firstName : user.username}">
                </div>

                <div class="email"
                     th:text="${user.email}">
                </div>
            </div>

        </div>

        <div class="info">

            <div class="row">
                <span th:text="#{user.username}">Username</span>
                <b th:text="${user.username}"></b>
            </div>

            <div class="row">
                <span th:text="#{user.firstName}">First Name</span>
                <b th:text="${user.firstName ?: '-'}"></b>
            </div>

            <div class="row">
                <span th:text="#{user.lastName}">Last Name</span>
                <b th:text="${user.lastName ?: '-'}"></b>
            </div>

            <div class="row">
                <span th:text="#{user.email}">Email</span>
                <b th:text="${user.email ?: '-'}"></b>
            </div>

            <div class="row level-row">
                <span th:text="#{user.level}">Level</span>
                <b class="level-badge" th:text="${user.level ?: '-'}"></b>
            </div>

        </div>

        <a href="/student/edit" class="edit-btn" th:text="#{button.edit}">
            Edit Profile
        </a>

    </div>

</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
</script>

</body>
</html>
