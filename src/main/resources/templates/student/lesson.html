<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{menu.lesson}">Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/student.css}">
    <style>
        body {
            background: url('/img/img_1.png') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>


<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 th:text="#{menu.lesson}">Lesson</h3>
</div>

<div class="content">

    <h2 class="page-title">📚 Lessons</h2>

    <div class="topics-grid">

        <div class="topic-card"
             th:each="t, stat : ${topics}"
             th:onclick="|window.location='/student/lesson/' + ${t.id}|">

            <div class="topic-index" th:text="${stat.count}"></div>

            <div class="topic-info">
                <div class="topic-title" th:text="${t.name}"></div>

                <div class="topic-progress" th:with="p=${progressMap[t.id]}">

                    <span th:if="${p == null}" class="not-passed">
                        Not passed
                    </span>

                    <span th:if="${p != null}" class="progress-data">

                        <span class="score" th:text="${p.score + '/' + p.total}"></span>

                        <span class="percent" th:text="${p.percent + '%'}"></span>

                        <span class="status"
                              th:text="${p.passed ? 'PASSED' : 'FAILED'}"
                              th:classappend="${p.passed} ? 'passed' : 'failed'">
                        </span>

                    </span>

                </div>
            </div>

        </div>

    </div>

    <div th:if="${showNextLevel}" class="next-level-block">
        <form th:action="@{/student/next-level}" method="post">
            <button class="next-btn" th:text="#{button.nextLevel}"></button>
        </form>
    </div>

</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
</script>

</body>
</html>
