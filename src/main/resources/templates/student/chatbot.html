<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{account.title}">Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/student.css}">
    <style>
        body {
            background: url('/img/img_1.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* MODE TABS */
        .mode-tabs {
            display: flex;
            gap: 8px;
            padding: 10px 15px 0;
            max-width: 700px;
            margin: 0 auto;
        }
        .mode-tab {
            flex: 1;
            padding: 9px 6px;
            border: 2px solid #6366f1;
            border-radius: 10px;
            background: white;
            color: #6366f1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-align: center;
        }
        .mode-tab.active {
            background: #6366f1;
            color: white;
        }
        .mode-desc {
            max-width: 700px;
            margin: 6px auto 4px;
            padding: 0 15px;
            font-size: 12px;
            color: #6b7280;
        }

        /* CHAT */
        .chat-wrapper {
            max-width: 700px;
            margin: 0 auto 20px !important;
            display: flex !important;
            flex-direction: column !important;
            height: calc(100dvh - 170px) !important;
            min-height: 300px !important;
            background: white !important;
            border-radius: 16px !important;
            overflow: hidden !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            position: relative !important;
        }
        .chat-container {
            flex: 1 !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            padding: 15px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            max-height: none !important;
            min-height: 0 !important;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #6366f1;
            color: white;
        }
        .message.ai {
            align-self: flex-start;
            background: #e5e7eb;
            color: #111;
        }
        .correction-badge {
            display: inline-block;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .thinking {
            align-self: flex-start;
            background: #e5e7eb;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 13px;
            color: #6b7280;
            font-style: italic;
        }
        .chat-input {
            display: flex !important;
            gap: 10px !important;
            padding: 10px 15px !important;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)) !important;
            background: white !important;
            border-top: 1px solid #e5e7eb !important;
            position: static !important;
        }
        .chat-input textarea {
            flex: 1;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #ccc !important;
            resize: none;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.4;
            min-height: 44px;
            max-height: 100px;
            overflow-y: auto;
        }
        .chat-input button {
            padding: 0 18px !important;
            height: 44px;
            border-radius: 12px !important;
            border: none;
            background: #6366f1 !important;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            align-self: flex-end;
        }

        @media (max-width: 768px) {
            .chat-wrapper { height: calc(100dvh - 160px) !important; margin: 0 10px 10px !important; }
            .mode-tabs { padding: 8px 10px 0; }
        }
        @media (max-width: 480px) {
            .mode-tab { font-size: 12px; padding: 8px 4px; }
            .message { max-width: 88%; font-size: 13px; }
            .chat-wrapper { height: calc(100dvh - 150px) !important; margin: 0 6px 6px !important; }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-content">
        <h2 th:text="#{menu.title}">Menu</h2>
        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>
        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>
    </div>
    <div class="sidebar-bottom">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">Logout</button>
        </form>
        <img src="/img/img.png" class="sidebar-image">
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 id="headerTitle">Chatbot — Learning</h3>
</div>

<!-- MODE TABS -->
<div class="mode-tabs">
    <button class="mode-tab active" id="tab-learning" onclick="setMode('learning')">
        Learning
    </button>
    <button class="mode-tab" id="tab-correction" onclick="setMode('correction')"
            th:classappend="${hasMistakes} ? ' has-mistakes' : ''">
        Error Correction
        <span th:if="${hasMistakes != null and hasMistakes}"
              style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:50%;margin-left:5px;vertical-align:middle;"></span>
    </button>
</div>
<div class="mode-desc" id="modeDesc">
    Practice conversation and intercultural communication with your AI teacher.
</div>

<span id="serverData"
      th:data-has-mistakes="${hasMistakes != null and hasMistakes}"
      th:data-percent="${progressPercent != null ? progressPercent : -1}"
      style="display:none"></span>

<div class="chat-wrapper">
    <div id="chat" class="chat-container"></div>

    <div class="chat-input">
        <textarea id="message" rows="1" placeholder="Type message..." oninput="autoResize(this)"></textarea>
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
    let currentMode = 'learning';

    const modeConfig = {
        learning: {
            tabLabel: 'Learning',
            header: 'Chatbot — Learning',
            placeholder: 'Type message...',
            desc: 'Practice conversation and intercultural communication with your AI teacher.'
        },
        correction: {
            tabLabel: 'Error Correction',
            header: 'Chatbot — Error Correction',
            placeholder: 'Ask about a mistake or type a follow-up question...',
            desc: 'AI reviews your test mistakes and explains them one by one. Ask follow-up questions anytime.'
        }
    };

    function setMode(mode, autoStart) {
        currentMode = mode;
        const cfg = modeConfig[mode];

        document.getElementById('tab-learning').classList.toggle('active', mode === 'learning');
        document.getElementById('tab-correction').classList.toggle('active', mode === 'correction');
        document.getElementById('headerTitle').textContent = cfg.header;
        document.getElementById('modeDesc').textContent = cfg.desc;
        document.getElementById('message').placeholder = cfg.placeholder;

        document.getElementById('chat').innerHTML = '';

        if (mode === 'correction' && autoStart !== false) {
            startCorrectionReview();
        }
    }

    async function startCorrectionReview() {
        const serverData = document.getElementById('serverData');
        const hasMistakes = serverData && serverData.dataset.hasMistakes === 'true';
        const percent = serverData ? parseInt(serverData.dataset.percent) : -1;

        if (percent === -1) {
            addCorrectionMessage("You haven't taken the test for this topic yet. Please take the test first, then come back here to review your mistakes.");
            return;
        }

        const thinking = addThinking();
        try {
            const res = await fetch(window.location.pathname, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "__start__", mode: "correction" }),
                credentials: "include"
            });
            const data = await res.json();
            thinking.remove();
            addCorrectionMessage(data.reply);
        } catch (e) {
            thinking.remove();
            addCorrectionMessage("Error: could not load your results.");
        }
    }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    async function send() {
        const input = document.getElementById("message");
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";
        input.style.height = 'auto';

        const thinking = addThinking();

        try {
            const res = await fetch(window.location.pathname, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, mode: currentMode }),
                credentials: "include"
            });

            const data = await res.json();
            thinking.remove();

            if (currentMode === 'correction') {
                addCorrectionMessage(data.reply);
            } else {
                addMessage(data.reply, "ai");
            }
        } catch (e) {
            thinking.remove();
            addMessage("Error: could not get a response.", "ai");
        }
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerText = text;
        appendToChat(div);
    }

    function addCorrectionMessage(text) {
        const wrapper = document.createElement("div");
        wrapper.className = "message ai";

        const badge = document.createElement("div");
        badge.className = "correction-badge";
        badge.textContent = "Error Correction";

        const content = document.createElement("div");
        content.innerText = text;

        wrapper.appendChild(badge);
        wrapper.appendChild(content);
        appendToChat(wrapper);
    }

    function addThinking() {
        const div = document.createElement("div");
        div.className = "thinking";
        div.textContent = "Thinking...";
        appendToChat(div);
        return div;
    }

    function appendToChat(el) {
        const chat = document.getElementById("chat");
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("message").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'correction') {
            setMode('correction', true);
        }
    })();
</script>

</body>
</html>
