<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{account.title}">Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/student.css}">
    <style>
        body {
            background: url('/img/img_1.png') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>


<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3>Chatbot</h3>
</div>

<div class="chat-wrapper">

    <div id="chat" class="chat-container"></div>

    <div class="chat-input">
        <input id="message" placeholder="Type message...">
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    async function send() {

        const input = document.getElementById("message");
        const text = input.value.trim();

        if (!text) return;

        addMessage(text, "user");

        input.value = "";

        const res = await fetch(window.location.pathname, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
            credentials: "include"
        });

        const data = await res.json();

        addMessage(data.reply, "ai");
    }

    function addMessage(text, type) {

        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerText = text;

        document.getElementById("chat").appendChild(div);

        document.getElementById("chat").scrollTop =
            document.getElementById("chat").scrollHeight;
    }

    document.getElementById("message").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            send();
        }
    });

</script>


</body>
</html>
