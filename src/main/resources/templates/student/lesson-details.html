<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title  th:text="#{menu.lesson}">Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/student.css}">
</head>
<body>

<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 th:text="${topic.name}"></h3>
</div>
<div class="lesson">

    <div class="lesson-block">
        <h2 class="lesson-title" th:text="#{lesson.description}"></h2>
        <p class="lesson-text" th:text="${topic.description}"></p>
    </div>

    <div class="lesson-block"
         th:if="${topic.videos != null and !topic.videos.isEmpty()}">

        <h2 class="lesson-title" th:text="#{lesson.videos}"></h2>

        <div class="lesson-slider">
            <button class="slider-btn left" onclick="scrollLeft('videoRow')">‹</button>

            <div class="slider-row" id="videoRow">
                <div class="video-card" th:each="v : ${topic.videos}">
                    <iframe th:src="${
    v.url.contains('watch?v=') ?
    v.url.replace('watch?v=', 'embed/') :
    v.url.replace('youtu.be/', 'www.youtube.com/embed/')
}"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <button class="slider-btn right" onclick="scrollRight('videoRow')">›</button>
        </div>
    </div>

    <!-- PHOTOS -->
    <div class="lesson-block"
         th:if="${topic.photos != null and !topic.photos.isEmpty()}">

        <h2 class="lesson-title" th:text="#{lesson.photos}"></h2>

        <div class="lesson-slider">
            <button class="slider-btn left" onclick="scrollLeft('photoRow')">‹</button>

            <div class="slider-row" id="photoRow">
                <div class="photo-card" th:each="p : ${topic.photos}">
                    <img th:src="${p.url}" onclick="openImage(this.src)"/>
                </div>
            </div>

            <button class="slider-btn right" onclick="scrollRight('photoRow')">›</button>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="lesson-actions">

        <a th:href="@{'/student/lesson/' + ${topic.id} + '/test'}">
            <button class="lesson-btn primary" th:text="#{test.start}"></button>
        </a>

        <a th:href="@{/student/lesson/{id}/chatbot(id=${topic.id})}">
            <button class="lesson-btn secondary">Chatbot</button>
        </a>

    </div>

</div>

<div id="imageModal" onclick="closeImage()">
    <img id="modalImg">
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function scrollLeft(id) {
        document.getElementById(id).scrollBy({ left: -300, behavior: 'smooth' });
    }

    function scrollRight(id) {
        document.getElementById(id).scrollBy({ left: 300, behavior: 'smooth' });
    }

    function openImage(src) {
        document.getElementById("imageModal").style.display = "flex";
        document.getElementById("modalImg").src = src;
    }

    function closeImage() {
        document.getElementById("imageModal").style.display = "none";
    }
</script>

</body>
</html>
