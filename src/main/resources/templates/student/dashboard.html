<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{dashboard.title}">Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/student.css}">
    <style>
        body {
            background: url('/img/img_1.png') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 th:text="#{dashboard.title}">Dashboard</h3>
</div>

<div class="content">

    <div th:if="${user.level == null}">

        <div class="card">
            <h2 th:text="#{assessment.title}">English Level Assessment</h2>
            <p th:text="#{assessment.desc}">Complete all parts</p>
        </div>

        <form th:action="@{/student/assessment/submit}" method="post">

            <h3 class="section-title" th:text="#{assessment.part1}">Part 1</h3>

            <div th:each="q, i : ${assessment.mcq}" class="card">
                <h4 th:text="${q.question}"></h4>

                <input type="hidden"
                       th:name="${'multipleChoiceAnswers[' + i.index + '].questionId'}"
                       th:value="${q.id}"/>

                <div th:each="opt : ${q.options}">
                    <label>
                        <input type="radio"
                               th:name="${'multipleChoiceAnswers[' + i.index + '].selectedOption'}"
                               th:value="${opt}"
                               required />
                        <span th:text="${opt}"></span>
                    </label>
                </div>
            </div>

            <h3 class="section-title" th:text="#{assessment.part2}">Part 2</h3>

            <div th:each="q, i : ${assessment.open}" class="card">
                <h4 th:text="${q.question}"></h4>

                <input type="hidden"
                       th:name="${'openAnswers[' + i.index + '].questionId'}"
                       th:value="${q.id}"/>

                <textarea th:name="${'openAnswers[' + i.index + '].answer'}"
                          th:placeholder="#{assessment.write}"
                          required></textarea>
            </div>

            <h3 class="section-title" th:text="#{assessment.part3}">Part 3</h3>

            <div th:each="q, i : ${assessment.speaking}" class="card speaking-card">
                <h4 th:text="${q.question}"></h4>

                <input type="hidden"
                       th:name="${'speakingAnswers[' + i.index + '].questionId'}"
                       th:value="${q.id}" />

                <input type="hidden"
                       th:name="${'speakingAnswers[' + i.index + '].audioBase64'}" />

                <div class="record-controls">
                    <button type="button" class="record-btn" onclick="startRecording(this)" th:text="#{record.start}">Start</button>
                    <button type="button" class="record-btn stop" onclick="stopRecording(this)" th:text="#{record.stop}">Stop</button>
                </div>

                <audio controls></audio>
            </div>

            <button type="submit" class="submit-btn" th:text="#{button.submit}">Submit</button>
        </form>

        <div th:if="${result != null}" class="card">
            <h3 th:text="#{result.level}">Your Level</h3>
            <span th:text="${result.level}"></span>
            <p th:text="${result.feedback}"></p>
        </div>
    </div>

    <div th:if="${user.level != null}">
        <div class="card result-card">
            <h2 th:text="#{result.level}">Your Level</h2>
            <span class="level-badge" style="color: white" th:text="${user.level}"></span>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
        let mediaRecorder;
        let audioChunks = [];

        function startRecording(btn) {
        const card = btn.closest('.speaking-card');
        const audio = card.querySelector('audio');

        navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };

        mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);

        audio.src = url;

        const reader = new FileReader();
        reader.readAsDataURL(blob);

        reader.onloadend = () => {
        const base64 = reader.result;

        const hiddenInput = card.querySelector('input[name*="audioBase64"]');
        hiddenInput.value = base64;
    };
    };

        mediaRecorder.start();
    })
        .catch(err => {
        alert("Microphone access denied 😢");
        console.error(err);
    });
    }
        function stopRecording(btn) {
        if (mediaRecorder) {
        mediaRecorder.stop();
    }
    }
</script>

</body>
</html>
