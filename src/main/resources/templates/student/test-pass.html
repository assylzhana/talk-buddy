<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pass Test</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="student-container">
    <div class="topbar">
        <h1 th:text="${topic.name}"></h1>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <form th:action="@{'/student/tests/' + ${topic.id}}" th:object="${submission}" method="post" class="test-form">
        <div class="question-card" th:each="question : ${questions}">
            <h3 th:text="${question.text}"></h3>

            <div th:each="answer : ${question.answers}" class="answer-option">
                <label>
                    <input type="radio"
                           th:name="${'selectedAnswers[' + question.id + ']'}"
                           th:value="${answer.id}">
                    <span th:text="${answer.text}"></span>
                </label>
            </div>
        </div>

        <button type="submit">Завершить тест</button>
    </form>
</div>
</body>
</html>
