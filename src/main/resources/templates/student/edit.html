<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{account.edit.title}">Edit Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/student.css}">
</head>
<body>
<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
</div>
<div class="page">

    <div class="profile">

        <div class="profile-header">

            <div class="avatar"
                 th:text="${user.username.substring(0,1).toUpperCase()}">
            </div>

            <div class="profile-info">
                <div class="name"
                     th:text="${user.firstName != null ? user.firstName : user.username}">
                </div>

                <div class="email"
                     th:text="${user.email}">
                </div>
            </div>

        </div>

        <form th:action="@{/student/update}" method="post" class="edit-form">

            <div class="field">
                <label th:text="#{user.firstName}">First Name</label>
                <input name="firstName" th:value="${user.firstName}">
            </div>

            <div class="field">
                <label th:text="#{user.lastName}">Last Name</label>
                <input name="lastName" th:value="${user.lastName}">
            </div>

            <div class="field">
                <label th:text="#{user.email}">Email</label>
                <input name="email" th:value="${user.email}">
            </div>

            <div class="field">
                <label th:text="#{user.password}">Password</label>
                <input type="password" name="password" th:placeholder="#{user.password.new}">
            </div>

            <button type="submit" class="save-btn" th:text="#{button.save}">
                Save
            </button>

        </form>

    </div>

</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
</script>

</body>
</html>
