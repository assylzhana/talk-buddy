<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{account.title}">Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/student.css}">

</head>
<body>
<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3>Test result</h3>
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

</script><div class="result-page">

    <div class="result-card-main">

        <h1 class="result-title">Result</h1>

        <div class="result-score" th:text="${correct + '/' + total}"></div>
        <div class="result-percent" th:text="${percent + '%'}"></div>

        <div th:if="${passed}" class="result-status pass">PASSED 🎉</div>
        <div th:if="${!passed}" class="result-status fail">FAILED 😢</div>

    </div>

    <div class="result-list">

        <div th:each="q, stat : ${topic.questions}"
             th:class="'result-item ' + (${resultMap[q.id]} ? 'correct' : 'incorrect')">

            <div class="question-text"
                 th:text="${stat.count + '. ' + q.text}">
            </div>

            <div class="question-result"
                 th:text="${resultMap[q.id]} ? '✔ Correct' : '✘ Incorrect'">
            </div>

        </div>

    </div>

    <div class="result-actions">
        <a href="/student/lesson">
            <button class="result-btn">Back to Lessons</button>
        </a>
    </div>

</div>
</body>
</html>
