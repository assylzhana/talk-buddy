<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{menu.lesson}">Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/student.css}">

</head>
<body>

<div class="sidebar" id="sidebar">

    <div class="sidebar-content">

        <h2 th:text="#{menu.title}">Menu</h2>

        <div class="lang-switch">
            <a th:href="@{?lang=en}">🇬🇧</a>
            <a th:href="@{?lang=ru}">🇷🇺</a>
            <a th:href="@{?lang=kk}">🇰🇿</a>
        </div>

        <a href="/student/dashboard" th:text="#{menu.dashboard}">Dashboard</a>
        <a href="/student/lesson" th:text="#{menu.lesson}">Lesson</a>
        <a href="/student/account" th:text="#{menu.account}">Account</a>

    </div>

    <div class="sidebar-bottom">

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" th:text="#{menu.logout}">
                Logout
            </button>
        </form>

        <img src="/img/img.png" class="sidebar-image">

    </div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="header">
    <div class="burger" id="burger" onclick="toggleSidebar()">☰</div>
    <h3 th:text="${topic.name}"></h3>
</div>

<div class="content test-page">

    <form method="post">

        <div th:each="q, stat : ${topic.questions}" class="test-card">

            <h3 class="test-question"
                th:text="${stat.count + '. ' + q.text}">
            </h3>

            <!-- TEST -->
            <div th:if="${q.type.name() == 'TEST'}">
                <label class="test-option" th:each="a : ${q.answers}">
                    <input type="radio"
                           th:name="${'selectedAnswers[' + q.id + ']'}"
                           th:value="${a.id}">
                    <span th:text="${a.text}"></span>
                </label>
            </div>

            <div th:if="${q.type.name() == 'FILL_GAP'}">
                <input class="test-input"
                       type="text"
                       th:name="${'fill_' + q.id}"
                       placeholder="Your answer">
            </div>

            <div th:if="${q.type.name() == 'MATCHING'}">

                <div class="test-matching">

                    <div class="test-left">
                        <div th:each="p : ${q.pairs}">
                            <div class="test-match-item"
                                 th:text="${p.leftText}">
                            </div>
                        </div>
                    </div>

                    <div class="test-right">
                        <select th:each="p, stat : ${q.pairs}"
                                class="test-select"
                                th:name="${'q_' + q.id + '_pair_' + stat.index}">

                            <option value="">Select</option>

                            <option th:each="rp : ${q.pairs}"
                                    th:value="${rp.id}"
                                    th:text="${rp.rightText}">
                            </option>

                        </select>
                    </div>

                </div>

            </div>

        </div>

        <div class="test-submit">
            <button type="submit" class="test-btn">Submit</button>
        </div>

    </form>

</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
</script>
</body>
</html>
